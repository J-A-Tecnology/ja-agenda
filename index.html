<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Agenda</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; }
        
        /* Topo da Página */
        .header-main { display: flex; justify-content: space-between; align-items: center; background-color: #fff; padding: 15px 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { background-color: #34495e; color: white; border: none; padding: 10px 12px; border-radius: 6px; font-size: 18px; cursor: pointer; }
        .title-area { display: flex; flex-direction: column; gap: 5px; }
        .title-area h1 { font-size: 24px; color: #34495e; }
        
        /* Área onde o Botão do Google vai ficar */
        #google-auth-container { margin-top: 2px; }
        #user-logged { display: flex; align-items: center; gap: 10px; font-weight: bold; background: #e8f5e9; padding: 5px 12px; border-radius: 20px; color: #2e7d32; font-size: 14px; }
        #user-logged img { width: 28px; height: 28px; border-radius: 50%; }

        /* Relógio Digital */
        .clock-container { background-color: #1a252f; color: #fff; padding: 10px 20px; border-radius: 6px; text-align: right; font-weight: bold; }
        .clock-time { font-size: 20px; letter-spacing: 1px; color: #3498db; }
        .clock-date { font-size: 11px; color: #bdc3c7; margin-top: 2px; }

        /* Navegação de Dias */
        .navigation-bar { display: flex; justify-content: space-between; align-items: center; background-color: #fff; padding: 12px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .nav-btn { background-color: #2980b9; color: white; border: none; padding: 10px 18px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .nav-btn:hover { background-color: #2471a3; }
        .current-date { font-size: 18px; font-weight: bold; color: #2c3e50; }

        /* Bloco do Formulário Verde */
        .card-form { background-color: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-title { font-size: 16px; color: #2c3e50; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; color: #7f8c8d; margin-bottom: 6px; }
        .input-text { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 4px; font-size: 14px; }
        
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-col { flex: 1; min-width: 150px; }
        .select-field, .input-date, .input-time { width: 100%; padding: 10px; border: 1px solid #dcdde1; border-radius: 4px; background-color: #fff; font-size: 14px; height: 42px; }
        
        /* Checkbox de Notificação */
        .notify-box { display: flex; align-items: center; gap: 8px; background-color: #f1f2f6; padding: 10px 15px; border-radius: 4px; height: 42px; width: 100%; justify-content: center; font-size: 13px; font-weight: bold; color: #2c3e50; }

        /* Botão Verde de Adicionar */
        .btn-add { width: 100%; background-color: #2a9d8f; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .btn-add:hover { background-color: #21867a; }

        /* Rodapé de Status */
        .no-tasks { text-align: center; color: #95a5a6; font-size: 14px; margin-top: 25px; }
    </style>
</head>
<body>

    <header class="header-main">
        <div class="header-left">
            <button class="menu-btn"><i class="fa-solid fa-bars"></i></button>
            <div class="title-area">
                <h1>Minha Agenda</h1>
                <div id="google-auth-container">
                    <div id="buttonDiv"></div>
                </div>
            </div>
        </div>
        
        <div class="clock-container">
            <div class="clock-time" id="live-clock">00:00:00</div>
            <div class="clock-date">22/05/2026</div>
        </div>
    </header>

    <section class="navigation-bar">
        <button class="nav-btn"><i class="fa-solid fa-caret-left"></i> Voltar</button>
        <span class="current-date">22/05/2026</span>
        <button class="nav-btn">Avançar <i class="fa-solid fa-caret-right"></i></button>
    </section>

    <main class="card-form">
        <h2 class="card-title"><i class="fa-solid fa-plus"></i> Nova Tarefa</h2>
        
        <div class="form-group">
            <label>O que você precisa fazer?</label>
            <input type="text" class="input-text" id="task-name" placeholder="Ex: Reunião com cliente ou Academia">
        </div>

        <div class="form-row">
            <div class="form-col">
                <label>Tipo de Tarefa</label>
                <select class="select-field">
                    <option>Tarefa Única (Data/Hora específica)</option>
                </select>
            </div>
            <div class="form-col">
                <label>Categoria (Cor)</label>
                <select class="select-field">
                    <option>🔵 Padrão (Azul)</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-col">
                <label>Data</label>
                <input type="text" class="input-date" value="22/05/2026" readonly>
            </div>
            <div class="form-col">
                <label>Horário (Opcional)</label>
                <input type="time" class="input-time" value="14:00">
            </div>
            <div class="form-col" style="display: flex; align-items: flex-end;">
                <label class="notify-box">
                    <input type="checkbox"> 🔔 Notificar-me
                </label>
            </div>
        </div>

        <button type="button" class="btn-add" onclick="salvarTarefa()">Adicionar na Agenda</button>
    </main>

    <div class="no-tasks">Nenhuma tarefa marcada para este dia.</div>

    <script src="script.js"></script>
</body>
</html>
