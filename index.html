<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Gerenciador de Tempo e Notas</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
            transition: padding-left 0.3s ease;
        }
        
        .container {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .cabecalho-menu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .cabecalho-esquerda {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .cabecalho-direita-relogio {
            text-align: right;
            background: #2d3748;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            min-width: 150px;
        }
        .relogio-tempo {
            font-size: 1.4rem;
            font-weight: bold;
            font-family: monospace;
            color: #63b3ed;
            line-height: 1.2;
        }
        .relogio-meta {
            font-size: 0.75rem;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-hamburguer {
            background: #4a5568;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            line-height: 1;
            transition: background 0.2s;
        }
        .btn-hamburguer:hover { background: #2d3748; }

        h1 { margin: 0; color: #4a5568; font-size: 1.8rem; }
        
        .bloco-navegacao-agenda {
            display: flex;
            flex-direction: column;
            margin-bottom: 30px;
        }
        .dia-da-semana-topo {
            font-size: 0.95rem;
            font-weight: bold;
            color: #4a5568;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            padding-left: 5px;
        }
        .navegador-datas {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #edf2f7;
            padding: 10px 20px;
            border-radius: 8px;
        }
        .btn-seta { background: #3182ce; color: white; border: none; padding: 8px 15px; font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn-seta:hover { background: #2b6cb0; }
        .data-atual { color: #2d3748; font-size: 1.2rem; font-weight: bold; margin: 0; }

        .formulario {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .formulario h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: #2d3748; }
        .grupo-campo { display: flex; flex-direction: column; gap: 5px; }
        .grupo-campo label { font-size: 0.9rem; font-weight: bold; color: #4a5568; }
        .formulario input, .formulario select, .formulario textarea { padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 1rem; font-family: inherit; box-sizing: border-box; }
        
        .linha-campos {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .linha-campos .grupo-campo {
            flex: 1;
            min-width: 150px;
        }
        
        .switch-notificacao {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #edf2f7;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            font-size: 0.9rem;
            font-weight: bold;
            color: #4a5568;
            min-width: 160px;
            height: 42px;
            box-sizing: border-box;
        }
        .switch-notificacao input {
            cursor: pointer;
            width: 16px;
            height: 16px;
            margin: 0;
        }

        .btn-adicionar { background: #319795; color: white; border: none; padding: 12px; font-size: 1rem; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 5px; }
        .btn-adicionar:hover { background: #2c7a7b; }
