<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Gerenciador de Tempo e Notas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
            transition: padding-left 0.3s ease;
        }
        
        .container {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .cabecalho-menu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .cabecalho-esquerda {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .cabecalho-direita-relogio {
            text-align: right;
            background: #2d3748;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            min-width: 150px;
        }
        .relogio-tempo {
            font-size: 1.4rem;
            font-weight: bold;
            font-family: monospace;
            color: #63b3ed;
            line-height: 1.2;
        }
        .relogio-meta {
            font-size: 0.75rem;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-hamburguer {
            background: #4a5568;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            line-height: 1;
            transition: background 0.2s;
        }
        .btn-hamburguer:hover { background: #2d3748; }

        h1 { margin: 0; color: #4a5568; font-size: 1.8rem; }
        
        .bloco-navegacao-agenda {
            display: flex;
            flex-direction: column;
            margin-bottom: 30px;
        }
        .dia-da-semana-topo {
            font-size: 0.95rem;
            font-weight: bold;
            color: #4a5568;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            padding-left: 5px;
        }
        .navegador-datas {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #edf2f7;
            padding: 10px 20px;
            border-radius: 8px;
        }
        .btn-seta { background: #3182ce; color: white; border: none; padding: 8px 15px; font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn-seta:hover { background: #2b6cb0; }
        .data-atual { color: #2d3748; font-size: 1.2rem; font-weight: bold; margin: 0; }

        .formulario {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .formulario h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: #2d3748; }
        .grupo-campo { display: flex; flex-direction: column; gap: 5px; }
        .grupo-campo label { font-size: 0.9rem; font-weight: bold; color: #4a5568; }
        .formulario input, .formulario select, .formulario textarea { padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 1rem; font-family: inherit; box-sizing: border-box; }
        
        .linha-campos {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .linha-campos .grupo-campo {
            flex: 1;
            min-width: 150px;
        }
        
        .switch-notificacao {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #edf2f7;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            font-size: 0.9rem;
            font-weight: bold;
            color: #4a5568;
            min-width: 160px;
            height: 42px;
            box-sizing: border-box;
        }
        .switch-notificacao input {
            cursor: pointer;
            width: 16px;
            height: 16px;
            margin: 0;
        }

        .btn-adicionar { background: #319795; color: white; border: none; padding: 12px; font-size: 1rem; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 5px; }
        .btn-adicionar:hover { background: #2c7a7b; }

        .lista-tarefas { display: flex; flex-direction: column; gap: 15px; }
        .tarefa-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f8fafc;
            border-left: 5px solid #3182ce;
            border-radius: 6px;
        }
        .tarefa-card.fixa { border-left-color: #319795; }
        .tarefa-card.feita { border-left-color: #a0aec0; background: #edf2f7; opacity: 0.7; }
        .tarefa-card.feita h3 { text-decoration: line-through; color: #718096; }
        
        .tarefa-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .tarefa-horario { font-size: 0.9rem; color: #4a5568; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; font-weight: 500; }
        .badge-notif { background: #e53e3e; color: white; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        
        .tarefa-info span.badge-tipo { font-size: 0.85rem; padding: 3px 8px; border-radius: 20px; color: white; }
        .badge-pontual { background-color: #3182ce; }
        .badge-fixa { background-color: #319795; }
        
        .acoes-tarefa { display: flex; align-items: center; gap: 10px; }
        .btn-status { border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-status.pendente { color: #e53e3e; background: #fff5f5; }
        .btn-status.concluida { color: #38a169; background: #f0fff4; }
        .btn-excluir { background: #e53e3e; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }

        /* MENU LATERAL */
        .sidebar-menu {
            position: fixed;
            top: 0;
            left: -320px;
            width: 290px;
            height: 100%;
            background: #1a202c;
            color: white;
            box-shadow: 4px 0 15px rgba(0,0,0,0.2);
            transition: left 0.3s ease;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        .sidebar-menu.aberta { left: 0; }
        
        .sidebar-titulo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #4a5568;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .sidebar-titulo h2 { margin: 0; font-size: 1.3rem; color: #e2e8f0; }
        .btn-fechar-menu { background: transparent; border: none; color: #a0aec0; font-size: 1.3rem; cursor: pointer; }
        
        .lista-abas { display: flex; flex-direction: column; gap: 10px; }
        .btn-aba {
            background: #2d3748;
            color: #e2e8f0;
            border: none;
            padding: 12px 15px;
            border-radius: 6px;
            text-align: left;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-aba:hover, .btn-aba.ativa { background: #4a5568; color: white; border-left: 4px solid #319795; }
        .badge-contador { background: #e53e3e; color: white; font-size: 0.8rem; padding: 2px 7px; border-radius: 10px; }

        /* MODAIS */
        .janela-conteudo { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 900; }
        .janela-conteudo.visivel { display: block; }
        
        .janela-corpo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #333;
            width: 95%;
            max-width: 850px;
            height: 85vh;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .janela-corpo h2 { margin-top: 0; color: #2d3748; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; display: flex; justify-content: space-between; margin-bottom: 15px; }
        
        .bloco-layout { display: flex; flex: 1; gap: 20px; overflow: hidden; }
        .notas-lateral { width: 250px; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 10px; padding-right: 15px; overflow-y: auto; }
        .btn-criar-nota { background: #3182ce; color: white; border: none; padding: 10px; font-weight: bold; border-radius: 6px; cursor: pointer; text-align: center; }
        .btn-criar-nota:hover { background: #2b6cb0; }
        
        .lista-mini-notas { display: flex; flex-direction: column; gap: 8px; }
        .mini-nota-card { padding: 10px; background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; display: flex; flex-direction: column; gap: 4px; transition: all 0.2s; }
        .mini-nota-card:hover { background: #edf2f7; }
        .mini-nota-card.selecionada { background: #e2e8f0; border-color: #cbd5e0; }
        .mini-nota-topo { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .mini-nota-card h4 { margin: 0; font-size: 0.95rem; color: #2d3748; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; }
        .mini-nota-data { font-size: 0.75rem; color: #718096; font-style: italic; }
        .btn-deletar-nota { background: transparent; border: none; color: #a0aec0; cursor: pointer; font-size: 0.9rem; padding: 0; }
        .btn-deletar-nota:hover { color: #e53e3e; }
